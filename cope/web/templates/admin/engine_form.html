{% extends "admin/base.html" %}
{% block title %}Engine - COPE Admin{% endblock %}
{% block content %}
<h1>{{ "Edit engine" if engine else "Register engine" }}</h1>
<form class="panel settings-form" method="post" action="{{ '/admin/engines/' ~ engine.id if engine else '/admin/engines' }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label for="name">Engine name</label>
  <input class="input" id="name" name="name" value="{{ values.get('name', '') }}" required maxlength="80">
  <label for="author">Author</label>
  <input class="input" id="author" name="author" value="{{ values.get('author', '') }}" maxlength="120">
  <label><input type="checkbox" name="active" {% if values.get('active', true) %}checked{% endif %}> Active</label>
  <p class="muted">Save the identity, then use the current admin app to upload and manage runnable versions.</p>
  <button class="button" type="submit">Save engine</button>
</form>
{% endblock %}
